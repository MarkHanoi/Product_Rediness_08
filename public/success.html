<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Successful — BIM Browser</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #12121a;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 56px 48px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
    }

    .icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      box-shadow: 0 0 40px rgba(16,185,129,0.3);
    }

    .icon svg {
      width: 36px;
      height: 36px;
      stroke: white;
      stroke-width: 2.5;
      fill: none;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
      color: #ffffff;
    }

    .subtitle {
      font-size: 16px;
      color: #8888a8;
      line-height: 1.6;
      margin-bottom: 36px;
    }

    .plan-badge {
      display: inline-block;
      background: linear-gradient(135deg, rgba(16,185,129,0.15), rgba(5,150,105,0.15));
      border: 1px solid rgba(16,185,129,0.3);
      color: #10b981;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 100px;
      margin-bottom: 36px;
    }

    .info-list {
      list-style: none;
      text-align: left;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 32px;
    }

    .info-list li {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: #a0a0c0;
      padding: 6px 0;
    }

    .info-list li::before {
      content: '✓';
      color: #10b981;
      font-weight: 700;
      flex-shrink: 0;
    }

    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      font-size: 15px;
      font-weight: 600;
      padding: 14px 32px;
      border-radius: 10px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      width: 100%;
    }

    .btn:hover { opacity: 0.9; }
    .btn:active { transform: scale(0.98); }

    .support {
      margin-top: 20px;
      font-size: 13px;
      color: #555570;
    }

    .support a {
      color: #6366f1;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>

    <h1>You're all set!</h1>
    <p class="subtitle">Your subscription is now active. All premium features are unlocked and ready to use.</p>

    <div class="plan-badge" id="plan-badge">Loading…</div>

    <ul class="info-list">
      <li>Your plan is active immediately</li>
      <li>A receipt has been emailed to you</li>
      <li>Cancel or manage anytime from Settings</li>
    </ul>

    <a href="/" class="btn" id="cta-btn">Open BIM Browser →</a>

    <p class="support">
      Questions? <a href="mailto:hello@pryzm.io">hello@pryzm.io</a>
    </p>
  </div>

  <script>
    // Read the plan from the URL query string (?plan=architect)
    // and update the badge. The server-side plan is already updated
    // via the Stripe webhook before the user lands here.
    const params = new URLSearchParams(window.location.search);
    const plan = params.get('plan') ?? '';
    const labels = {
      architect: 'Architect Plan',
      studio:    'Studio Plan',
      firm:      'Firm Plan',
    };
    const badge = document.getElementById('plan-badge');
    badge.textContent = labels[plan] ?? 'Subscription Active';

    // Auto-redirect to the app after 4 seconds
    let countdown = 4;
    const btn = document.getElementById('cta-btn');
    function tick() {
      if (countdown > 0) {
        btn.textContent = `Open BIM Browser → (${countdown})`;
        countdown--;
        setTimeout(tick, 1000);
      } else {
        window.location.href = '/';
      }
    }
    tick();
  </script>
</body>
</html>
