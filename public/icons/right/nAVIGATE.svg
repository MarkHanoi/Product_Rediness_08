<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Head -->
  <circle cx="34" cy="18" r="10" stroke="#1C1B3C" stroke-width="4.5"/>
  <!-- Body stem -->
  <line x1="34" y1="28" x2="34" y2="60" stroke="#1C1B3C" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Left arm (up-left) -->
  <line x1="34" y1="42" x2="16" y2="30" stroke="#1C1B3C" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Right arm (angled forward) -->
  <line x1="34" y1="42" x2="52" y2="48" stroke="#1C1B3C" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Left leg -->
  <line x1="34" y1="60" x2="18" y2="82" stroke="#1C1B3C" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Right leg (slightly forward) -->
  <line x1="34" y1="60" x2="42" y2="82" stroke="#1C1B3C" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Arrow shaft -->
  <line x1="62" y1="50" x2="90" y2="50" stroke="#1C1B3C" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Arrow head -->
  <polyline points="78,39 90,50 78,61"
            stroke="#1C1B3C" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
