<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Sphere circle -->
  <circle cx="44" cy="63" r="31" stroke="#1C1B3C" stroke-width="5"/>
  <!-- Inner crescent arc (curved shading on left side of sphere) -->
  <path d="M29,44 Q19,63 29,82"
        stroke="#1C1B3C" stroke-width="4.5" stroke-linecap="round" fill="none"/>
  <!-- Light ray 1 (upper-right, diagonal up-right) -->
  <line x1="68" y1="28" x2="76" y2="18" stroke="#1C1B3C" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Light ray 2 (right, horizontal) -->
  <line x1="73" y1="38" x2="85" y2="34" stroke="#1C1B3C" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Light ray 3 (lower-right diagonal) -->
  <line x1="74" y1="50" x2="86" y2="50" stroke="#1C1B3C" stroke-width="4.5" stroke-linecap="round"/>
</svg>
