<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PRYZM — Beta wait-list</title>
    <meta name="description" content="Sign up for the PRYZM private beta. 25 invited cohort. Multi-user real-time BIM collab." />
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0d10;
        --fg: #e7eaee;
        --muted: #8b94a3;
        --accent: #7ad7ff;
        --field: #14181d;
        --border: #232831;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        font: 16px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      }
      main {
        max-width: 560px;
        margin: 0 auto;
        padding: 64px 24px 96px;
      }
      h1 { font-size: 28px; margin: 0 0 8px; letter-spacing: -0.01em; }
      .lede { color: var(--muted); margin: 0 0 32px; }
      label { display: block; font-size: 14px; margin: 16px 0 6px; color: var(--muted); }
      input, select, textarea {
        width: 100%;
        padding: 10px 12px;
        background: var(--field);
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: 6px;
        font: inherit;
      }
      textarea { min-height: 80px; resize: vertical; }
      .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      button {
        margin-top: 24px;
        padding: 12px 18px;
        background: var(--accent);
        color: #04111c;
        border: 0;
        border-radius: 6px;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled { opacity: 0.5; cursor: progress; }
      .status {
        margin-top: 16px;
        padding: 10px 12px;
        border-radius: 6px;
        font-size: 14px;
        display: none;
      }
      .status.ok { background: #143018; color: #b9f3c5; display: block; }
      .status.err { background: #3a1818; color: #fecaca; display: block; }
      footer { color: var(--muted); font-size: 13px; margin-top: 32px; }
      footer a { color: var(--accent); text-decoration: none; }
    </style>
  </head>
  <body>
    <main>
      <h1>PRYZM — Private Beta</h1>
      <p class="lede">
        25 invited practitioners, 6-week beta. Plan view + section view + sheets +
        schedules + multi-user real-time collab. Join the wait-list and we'll reach
        out as cohort slots open.
      </p>

      <form id="beta-signup" novalidate>
        <div class="row">
          <div>
            <label for="name">Name</label>
            <input id="name" name="name" required autocomplete="name" />
          </div>
          <div>
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required autocomplete="email" />
          </div>
        </div>

        <label for="cohort">Which best describes you?</label>
        <select id="cohort" name="cohort" required>
          <option value="">Choose one…</option>
          <option value="c1">Independent practitioner</option>
          <option value="c2">Small studio (2–5 users)</option>
          <option value="c3">Large practice IT</option>
          <option value="academic">Academic / educator</option>
        </select>

        <label for="useCase">Tell us how you'd use PRYZM (optional, ≤ 500 chars)</label>
        <textarea id="useCase" name="useCase" maxlength="500"></textarea>

        <button type="submit" id="submitBtn">Join the wait-list</button>
        <div class="status" id="status"></div>
      </form>

      <footer>
        Already invited? <a href="/">Open the editor</a>.
      </footer>
    </main>

    <script>
      // Minimal client. Posts to /api/beta/signup; the server route
      // mounting is bound to S48 D9 launch (see ADR-0038 §3 — until
      // then the form returns a friendly "wait-list paused" message).
      const form = document.getElementById('beta-signup');
      const status = document.getElementById('status');
      const btn = document.getElementById('submitBtn');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        status.className = 'status';
        status.textContent = '';
        btn.disabled = true;
        const fd = new FormData(form);
        const payload = {
          name: fd.get('name'),
          email: fd.get('email'),
          cohort: fd.get('cohort'),
          useCase: fd.get('useCase') || undefined,
          renderedAt: new Date().toISOString(),
        };
        try {
          const res = await fetch('/api/beta/signup', {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify(payload),
          });
          if (res.status === 404) {
            status.className = 'status ok';
            status.textContent =
              "Thanks — wait-list opens at launch (S48 D9). We've recorded your interest.";
          } else if (res.ok) {
            status.className = 'status ok';
            status.textContent = "You're on the list. Check your inbox for confirmation.";
            form.reset();
          } else {
            const body = await res.json().catch(() => ({}));
            status.className = 'status err';
            status.textContent = body.error || 'Sign-up failed. Try again later.';
          }
        } catch {
          status.className = 'status err';
          status.textContent = 'Network error. Try again later.';
        } finally {
          btn.disabled = false;
        }
      });
    </script>
  </body>
</html>
