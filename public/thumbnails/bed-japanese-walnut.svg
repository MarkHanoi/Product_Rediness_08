<svg viewBox="0 0 80 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Thin panel headboard (walnut dark) -->
  <rect x="8" y="10" width="64" height="14" rx="2" fill="#7b4f2e" stroke="#5c3520" stroke-width="1"/>
  <!-- Slatted detail lines on headboard -->
  <line x1="19" y1="12" x2="19" y2="22" stroke="#5c3520" stroke-width="1" opacity="0.5"/>
  <line x1="30" y1="12" x2="30" y2="22" stroke="#5c3520" stroke-width="1" opacity="0.5"/>
  <line x1="41" y1="12" x2="41" y2="22" stroke="#5c3520" stroke-width="1" opacity="0.5"/>
  <line x1="52" y1="12" x2="52" y2="22" stroke="#5c3520" stroke-width="1" opacity="0.5"/>
  <line x1="63" y1="12" x2="63" y2="22" stroke="#5c3520" stroke-width="1" opacity="0.5"/>
  <!-- Bed frame low rails -->
  <rect x="8" y="24" width="64" height="4" rx="1" fill="#8b5a30" stroke="#6a3e18" stroke-width="0.8"/>
  <rect x="8" y="44" width="64" height="4" rx="1" fill="#8b5a30" stroke="#6a3e18" stroke-width="0.8"/>
  <rect x="8" y="24" width="3" height="24" rx="1" fill="#8b5a30" stroke="#6a3e18" stroke-width="0.8"/>
  <rect x="69" y="24" width="3" height="24" rx="1" fill="#8b5a30" stroke="#6a3e18" stroke-width="0.8"/>
  <!-- Block feet -->
  <rect x="11" y="47" width="6" height="5" rx="1" fill="#6a3e18"/>
  <rect x="63" y="47" width="6" height="5" rx="1" fill="#6a3e18"/>
  <!-- Mattress -->
  <rect x="11" y="27" width="58" height="17" rx="1.5" fill="#e8e0d0" stroke="#c8c0b0" stroke-width="0.8"/>
  <!-- Pillows -->
  <rect x="14" y="29" width="20" height="8" rx="3" fill="#f5f2ec" stroke="#d8d0c4" stroke-width="0.6"/>
  <rect x="46" y="29" width="20" height="8" rx="3" fill="#f5f2ec" stroke="#d8d0c4" stroke-width="0.6"/>
  <!-- Blanket stripe -->
  <rect x="11" y="37" width="58" height="7" rx="1" fill="#a0907c" opacity="0.35"/>
</svg>
