<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <!-- Background -->
  <rect width="80" height="80" rx="10" fill="#f5f0e8"/>
  <!-- Main arm (horizontal, back wall) -->
  <rect x="8" y="8" width="64" height="32" rx="2" fill="#c8b898" stroke="#a09070" stroke-width="1.5"/>
  <line x1="24" y1="8" x2="24" y2="40" stroke="#a09070" stroke-width="1.2"/>
  <line x1="40" y1="8" x2="40" y2="40" stroke="#a09070" stroke-width="1.2"/>
  <line x1="56" y1="8" x2="56" y2="40" stroke="#a09070" stroke-width="1.2"/>
  <rect x="9"  y="9" width="14" height="30" rx="1" fill="#d4c4a0" stroke="#b0a080" stroke-width="0.8"/>
  <rect x="25" y="9" width="14" height="30" rx="1" fill="#d4c4a0" stroke="#b0a080" stroke-width="0.8"/>
  <rect x="41" y="9" width="14" height="30" rx="1" fill="#d4c4a0" stroke="#b0a080" stroke-width="0.8"/>
  <rect x="57" y="9" width="14" height="30" rx="1" fill="#d4c4a0" stroke="#b0a080" stroke-width="0.8"/>
  <!-- Left arm (vertical, side wall) -->
  <rect x="8" y="8" width="16" height="46" rx="2" fill="#c8b898" stroke="#a09070" stroke-width="1.5"/>
  <line x1="8" y1="31" x2="24" y2="31" stroke="#a09070" stroke-width="1.2"/>
  <rect x="9" y="32" width="14" height="21" rx="1" fill="#d4c4a0" stroke="#b0a080" stroke-width="0.8"/>
  <!-- Handles -->
  <rect x="21" y="20" width="2" height="6" rx="1" fill="#888"/>
  <rect x="37" y="20" width="2" height="6" rx="1" fill="#888"/>
  <rect x="53" y="20" width="2" height="6" rx="1" fill="#888"/>
  <rect x="14" y="39" width="6" height="2" rx="1" fill="#888"/>
  <!-- Corner indicator -->
  <path d="M24 40 L24 54 Q8 54 8 54" stroke="#a09070" stroke-width="0.5" fill="none" stroke-dasharray="2,2"/>
</svg>
