<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <!-- Background -->
  <rect width="80" height="80" rx="10" fill="#f5f0e8"/>
  <!-- Main arm (back wall) -->
  <rect x="18" y="8" width="44" height="22" rx="2" fill="#c8b898" stroke="#a09070" stroke-width="1.5"/>
  <line x="32" y1="8" x2="32" y2="30" stroke="#a09070" stroke-width="1.2"/>
  <line x1="47" y1="8" x2="47" y2="30" stroke="#a09070" stroke-width="1.2"/>
  <rect x="19" y="9"  width="12" height="20" rx="1" fill="#d4c4a0" stroke="#b0a080" stroke-width="0.8"/>
  <rect x="33" y="9"  width="13" height="20" rx="1" fill="#d4c4a0" stroke="#b0a080" stroke-width="0.8"/>
  <rect x="48" y="9"  width="13" height="20" rx="1" fill="#d4c4a0" stroke="#b0a080" stroke-width="0.8"/>
  <!-- Left arm (left wall) -->
  <rect x="8" y="8" width="12" height="56" rx="2" fill="#c8b898" stroke="#a09070" stroke-width="1.5"/>
  <line x1="8" y1="36" x2="20" y2="36" stroke="#a09070" stroke-width="1.2"/>
  <line x1="8" y1="52" x2="20" y2="52" stroke="#a09070" stroke-width="1.2"/>
  <rect x="9" y="9"  width="10" height="26" rx="1" fill="#d4c4a0" stroke="#b0a080" stroke-width="0.8"/>
  <rect x="9" y="37" width="10" height="14" rx="1" fill="#d4c4a0" stroke="#b0a080" stroke-width="0.8"/>
  <rect x="9" y="53" width="10" height="10" rx="1" fill="#d4c4a0" stroke="#b0a080" stroke-width="0.8"/>
  <!-- Right arm (right wall) -->
  <rect x="60" y="8" width="12" height="56" rx="2" fill="#c8b898" stroke="#a09070" stroke-width="1.5"/>
  <line x1="60" y1="36" x2="72" y2="36" stroke="#a09070" stroke-width="1.2"/>
  <line x1="60" y1="52" x2="72" y2="52" stroke="#a09070" stroke-width="1.2"/>
  <rect x="61" y="9"  width="10" height="26" rx="1" fill="#d4c4a0" stroke="#b0a080" stroke-width="0.8"/>
  <rect x="61" y="37" width="10" height="14" rx="1" fill="#d4c4a0" stroke="#b0a080" stroke-width="0.8"/>
  <rect x="61" y="53" width="10" height="10" rx="1" fill="#d4c4a0" stroke="#b0a080" stroke-width="0.8"/>
  <!-- Floor/opening indicator -->
  <rect x="20" y="64" width="40" height="8" rx="2" fill="#e8dcc8" stroke="#c0b090" stroke-width="1" stroke-dasharray="3,2"/>
</svg>
