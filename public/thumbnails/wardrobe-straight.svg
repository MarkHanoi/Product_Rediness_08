<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <!-- Background -->
  <rect width="80" height="80" rx="10" fill="#f5f0e8"/>
  <!-- Wardrobe carcass -->
  <rect x="8" y="10" width="64" height="62" rx="2" fill="#c8b898" stroke="#a09070" stroke-width="1.5"/>
  <!-- 4 section dividers -->
  <line x1="24" y1="10" x2="24" y2="72" stroke="#a09070" stroke-width="1.2"/>
  <line x1="40" y1="10" x2="40" y2="72" stroke="#a09070" stroke-width="1.2"/>
  <line x1="56" y1="10" x2="56" y2="72" stroke="#a09070" stroke-width="1.2"/>
  <!-- Door panels (alternating hanger/shelf) -->
  <rect x="9"  y="11" width="14" height="60" rx="1" fill="#d4c4a0" stroke="#b0a080" stroke-width="0.8"/>
  <rect x="25" y="11" width="14" height="60" rx="1" fill="#d4c4a0" stroke="#b0a080" stroke-width="0.8"/>
  <rect x="41" y="11" width="14" height="60" rx="1" fill="#d4c4a0" stroke="#b0a080" stroke-width="0.8"/>
  <rect x="57" y="11" width="14" height="60" rx="1" fill="#d4c4a0" stroke="#b0a080" stroke-width="0.8"/>
  <!-- Handles -->
  <rect x="21" y="37" width="2" height="7" rx="1" fill="#888"/>
  <rect x="25" y="37" width="2" height="7" rx="1" fill="#888"/>
  <rect x="37" y="37" width="2" height="7" rx="1" fill="#888"/>
  <rect x="41" y="37" width="2" height="7" rx="1" fill="#888"/>
  <rect x="53" y="37" width="2" height="7" rx="1" fill="#888"/>
  <rect x="57" y="37" width="2" height="7" rx="1" fill="#888"/>
  <rect x="69" y="37" width="2" height="7" rx="1" fill="#888"/>
</svg>
