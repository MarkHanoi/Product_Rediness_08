<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Cancelled — BIM Browser</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #12121a;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 56px 48px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
    }

    .icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #374151, #1f2937);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
    }

    .icon svg {
      width: 36px;
      height: 36px;
      stroke: #6b7280;
      stroke-width: 2;
      fill: none;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
      color: #ffffff;
    }

    .subtitle {
      font-size: 16px;
      color: #8888a8;
      line-height: 1.6;
      margin-bottom: 36px;
    }

    .btn-primary {
      display: block;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      font-size: 15px;
      font-weight: 600;
      padding: 14px 32px;
      border-radius: 10px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s;
      width: 100%;
      margin-bottom: 12px;
    }

    .btn-primary:hover { opacity: 0.9; }

    .btn-secondary {
      display: block;
      background: transparent;
      color: #6b7280;
      font-size: 14px;
      font-weight: 500;
      padding: 12px 32px;
      border-radius: 10px;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.08);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      width: 100%;
    }

    .btn-secondary:hover {
      border-color: rgba(255,255,255,0.2);
      color: #a0a0c0;
    }

    .note {
      margin-top: 28px;
      font-size: 13px;
      color: #555570;
      line-height: 1.5;
    }

    .note a {
      color: #6366f1;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10"/>
        <line x1="15" y1="9" x2="9" y2="15"/>
        <line x1="9" y1="9" x2="15" y2="15"/>
      </svg>
    </div>

    <h1>Payment cancelled</h1>
    <p class="subtitle">
      No charge was made. You can go back and try again whenever you're ready —
      your account and projects are untouched.
    </p>

    <a href="/" class="btn-primary">Back to BIM Browser</a>
    <a href="/#pricing" class="btn-secondary">View plans again</a>

    <p class="note">
      Need help deciding? <a href="mailto:hello@pryzm.io">Contact us</a> — we're happy to walk you through the plans.
    </p>
  </div>
</body>
</html>
