<?xml version="1.0" encoding="UTF-8"?>
<!--
  PRYZM 2 wall-tool icon (S09-T5).

  24×24 outline icon — two parallel walls in plan view, with a vertical
  end cap.  Stroke kept neutral so the toolbar chrome can recolour via
  CSS `currentColor`.  Mirrors the silhouette of the PRYZM 1 wall-tool
  cursor at `src/elements/walls/cursor/wall-cursor.svg`.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"
     fill="none" stroke="currentColor" stroke-width="1.6"
     stroke-linecap="round" stroke-linejoin="round">
  <line x1="3" y1="9"  x2="21" y2="9"  />
  <line x1="3" y1="15" x2="21" y2="15" />
  <line x1="3" y1="9"  x2="3"  y2="15" />
  <line x1="21" y1="9" x2="21" y2="15" />
</svg>
