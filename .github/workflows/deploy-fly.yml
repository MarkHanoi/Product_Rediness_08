# deploy-marker: v131 (founder go) — §PARTITION-TOP-AT-SLAB-UNDERSIDE: interior partitions stop at the slab underside (founder 2026-06-11: "the walls are going through the slab they are too high — the internal walls need to automatically be set to the plane of under slab — the bottom of the slab level"). ROOT: the shell got §WALL-TOP-AT-SLAB-BOTTOM (clamped to wallHeightM) but interior partitions were built at the FULL floorToFloor wallHeightM (3.0m) → with the level-above slab occupying [floor−0.2, floor], a 3.0m partition runs THROUGH the slab and tops at the upper floor level → it pokes into the storey-above plan as ghost reference linework (worse under the auto "Architectural Documentation" intent which shows 1.2m below). FIX (HouseLayoutExecutor step 1): for every storey that HAS a slab above (NOT the top storey), clamp its partition payload heights to wallHeightM − DEFAULT_SLAB_THICKNESS_M (2.8m) so each partition stops at the slab UNDERSIDE and the solid slab occludes it from the plan above (complements the v128 §VIEW-RANGE-BELOW classifier fix — that bounded the beyond zone, this removes the geometry that was legitimately IN it). Top storey (roof above, no slab) + single-storey untouched → byte-identical. Doors/windows/room-detection unaffected (plan-frame + sub-2.8m). Editor typecheck zero-new-errors.
