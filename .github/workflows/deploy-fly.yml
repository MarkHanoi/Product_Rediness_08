# ─────────────────────────────────────────────────────────────────────────────
# deploy-fly.yml — Continuous deployment to Fly.io.
#
# Canonical contract: ADR-055 (docs/02-decisions/adrs/ADR-055-one-pryzm-cloudflare-supabase.md).
# Trigger: every push to `main` (+ manual). The image is built ON THIS RUNNER
# via `flyctl deploy --local-only` (GitHub's ubuntu-latest = 16GB RAM + Docker),
# NOT on Fly's managed builder — that builder OOM-kills this ~6GB-heap, 3624-
# module client build at exit 137 and cannot be resized from the CLI. The runner
# pushes the finished image to Fly's registry.
#
# Prerequisites (one-time setup):
#   1. `flyctl auth token` → store output as the `FLY_API_TOKEN` repo secret.
#   2. `flyctl secrets set` for every runtime env var listed in fly.toml's header.
#   3. The `pryzm` app exists in the Fly org (`flyctl apps create pryzm`).
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy to Fly.io

on:
  # §A.10.q — PUSH-DEPLOY re-enabled (repo PUBLIC) to ship v40 (A.21.D29 + D28 #7/#9).
  # Builds on the 16GB runner WITH the VITE_CESIUM_TOKEN secret (real 3D-Tiles globe)
  # when set. Revert to manual-only (§A.10.i) before going private again.
  push:
    branches: [main]
  workflow_dispatch:

# Latest-wins: a newer push to main cancels an older in-flight deploy so prod
# always converges on the newest commit (correct for continuous deployment).
concurrency:
  group: deploy-fly
  cancel-in-progress: true

jobs:
  deploy:
    name: build (16GB runner) + deploy
    runs-on: ubuntu-latest
    # Hard ceiling — building the full minified client on the runner (~10-15 min)
    # + image push + machine bounce. A 30-min cap catches a hang without burning
    # an hour of Actions minutes.
    timeout-minutes: 30

    # Surface a deploy URL in the Actions UI ("View deployment" button).
    environment:
      name: production
      url: https://pryzm.fly.dev

    permissions:
      # We only need to read the repo + write deployment statuses; nothing else.
      contents: read
      deployments: write

    steps:
      - name: Check out code
        # actions/checkout@v5 runs on Node.js 24 — v4 (Node 20) is deprecated and will be
        # force-migrated 2026-06-16 / removed 2026-09-16 (GitHub runner Node-20 deprecation).
        uses: actions/checkout@v5
        with:
          # Shallow clone is fine — flyctl uploads the working tree as a tarball
          # to the remote builder, history isn't used.
          fetch-depth: 1

      - name: Install flyctl
        # Pinned to the action's `master` per Fly's published install pattern.
        # If we ever need reproducibility on the CLI version itself, pin to a
        # tagged release of the action AND pass `version:` here.
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly
        # --local-only: build the image with THIS runner's Docker daemon (16GB)
        #   instead of Fly's managed builder, which OOM-kills this build at exit
        #   137 (and can't be resized from the CLI). The runner then pushes the
        #   finished image to Fly's registry — nothing builds/uploads from a dev box.
        # --build-arg LOWMEM=0: full esbuild minify (the runner has the RAM the
        #   managed builder lacked — see Dockerfile `ARG LOWMEM`).
        # --strategy=rolling: explicit single-machine rolling bounce.
        # --build-arg VITE_CESIUM_TOKEN: optional Cesium ion token (GIS-CESIUM-
        #   PHOTOREAL). When the `VITE_CESIUM_TOKEN` repo secret is set, vite bakes
        #   it into the client bundle and the "3D globe" streams Google Photorealistic
        #   3D Tiles + the ion satellite base. When the secret is empty/absent the
        #   build arg is "" → the keyless ESRI satellite basemap (current behaviour),
        #   so adding the secret is the ONLY step needed to switch on full photoreal.
        # --build-arg VITE_GOOGLE_MAPS_KEY: optional Google Maps Platform API key
        #   (GIS-CESIUM-GOOGLE-KEY, A.21.D31) — the ALTERNATIVE real-tiles credential.
        #   When the `VITE_GOOGLE_MAPS_KEY` repo secret is set (and no ion token), the
        #   globe streams the SAME Google Photorealistic 3D Tiles directly via the key.
        #   Empty/absent (the default) → no effect, keyless ESRI fallback unchanged.
        #   Branch order is ion-token → google-key → keyless.
        run: flyctl deploy --local-only --build-arg LOWMEM=0 --build-arg VITE_CESIUM_TOKEN="${{ secrets.VITE_CESIUM_TOKEN }}" --build-arg VITE_GOOGLE_MAPS_KEY="${{ secrets.VITE_GOOGLE_MAPS_KEY }}" --strategy=rolling
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

