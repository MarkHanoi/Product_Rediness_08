# deploy-marker: v107 (founder go) — §SW-LAZY-CHUNK-404 (unblocks batch-furnish + globe) + trustworthy §DIAG-EXEC/§DIAG-SEAL. (1) §SW-LAZY-CHUNK-404: batch-furnish-all-rooms + the globe real-model overlay failed on prod with 'Failed to fetch dynamically imported module …/assets/index-BbFNqnZ7.js' — the service worker 'pryzm-v3' served a STALE cached shell + eager chunks (whose hashes 404 on the moved-on server), so a fresh lazy index-*.js import hit the SPA text/html fallback → module MIME failure. Fix: SW cache v3→v4 (evicts the poisoned shell + fires the one-time auto-reload) + /assets/* branch treats any text/html/non-OK response as a MISS (never serves the SPA fallback as a module). FurnishExecutor lazy-imports @pryzm/ai-host; globe imports @pryzm/file-format. (2) Trustworthy diagnostics: §DIAG-EXEC-WINDOWS WINDOW-ON-PARTITION no longer false-flags shell perimeter walls (decided by the authoritative shell wall-id set, new houseShellWalls.ts) + §DIAG-EXEC-STAIR HABITABLE-ON-STAIR keys off the resolveStairRooms keep ids (was reading un-committed occupancy) + §DIAG-SEAL gains partSpan= (point-to-segment) so the next run says partition↔shell open-seam vs partition↔partition T-join. v106 PROVED the thesis: engineRooms=9 vs detected=8 = Living+Bedroom1 merged (a partition didn't seal); the engine design is correct. Governance: C07 §7, ADR-055, C53, ADR-0066/0063/0061.
# deploy-marker: v106 (founder go) — room.delete legacy bridge makes §STAIR-VOID-EXCLUDE actually delete. v105 shipped §STAIR-VOID-EXCLUDE but its `room.delete` no-op'd: room.rename is an F-1.x BRIDGE to window.commandManager (the legacy RoomStore + bimManager where DETECTED rooms live), but room.delete instead mutated the plugin SDK RoomsState → deleting a detected room (the phantom stair cell) silently failed canExecute('room not found'). Fix: DeleteRoomHandler now bridges to the legacy DeleteRoomCommand exactly like RenameRoomHandler — full removal (roomStore.remove + bimManager.unregister + elementRegistry.unregister + semantic-graph cleanup) + legacy-undo inverse. Fixes room.delete for ALL callers (the property-inspector room delete was also silently broken on detected rooms). So the §DIAG-EXEC-STAIR rollup should now read roomsOverStairVoid=1 with NO ⚠ HABITABLE-ON-STAIR. Governance: C11, ADR-0063/0066.
# deploy-marker: v105 (founder go) — §STAIR-VOID-EXCLUDE: phantom stair-void rooms collapsed to ONE non-habitable Stair. Founder defect #7: the editor redetect traces the BUILT wall graph and the stair body spans a wall line → the stair footprint splits into TWO enclosed faces (the 8.1m² + 25.3m² phantom rooms). §ROOM-NAME-BIJECTIVE (v104) stopped the duplicate NAME but the 2nd cell survived as a ~25m² habitable-looking room. Fix (resolveStairRooms.ts): keep the centre-nearest cell (named "Stair", occupancy stair), DELETE the rest in the same rename batch (room.delete, skipRedetectRooms), and exclude both kept+dropped ids from the engine→detected matcher so no engine room re-names a stair cell. §DIAG-STAIR-VOID-EXCLUDE logs per-rect counts; after it the §DIAG-EXEC-STAIR rollup should read roomsOverStairVoid=1 with NO ⚠ HABITABLE-ON-STAIR. Apartment byte-identical (no stair rects ⇒ no-op, ADR-0061). +6 tests, ai-host 2209. Governance: ADR-0063/0066, C53, C11.
# deploy-marker: v104 (founder go) — duplicate-room naming fix + execution-boundary diagnostics. (1) §ROOM-NAME-BIJECTIVE: the editor room-naming matcher was single-pass with no uniqueness → one engine room could name TWO detected cells (the 53m² ghost 'En-suite' beside the real one) + a partner-less cell kept the empty 'Room 00-008' fallback. Fix: matchDetectedRooms.ts makes a BIJECTION (pass-1 centroid-containment, pass-2 nearest over UNUSED engine rooms only) → no duplicate 'Stair'/'En-suite', no fallback name; §DIAG-STAIR-NAME flags stairRooms>1/unmatched. (2) §DIAG-EXEC-*: always-on editor-side designed-vs-shipped diagnostics per level — §DIAG-EXEC-ROOMS (engine N vs detected M + mismatch), §DIAG-EXEC-AREA (detected vs engine target + §AREA-FRACTIONS cap → OVER-CAP), §DIAG-EXEC-DOORS (per-room door count + roomsWithDoor rollup), §DIAG-EXEC-WINDOWS (per-room window count + WINDOW-ON-PARTITION), §DIAG-EXEC-ROTATION (principal axis°), §DIAG-EXEC-STAIR (HABITABLE-ON-STAIR) — so a console paste pinpoints WHICH layer (engine vs detection vs naming) loses quality. The engine designs good rooms (a 53m² en-suite is impossible from its caps) → the divergence is the engine→editor boundary. + ADR-0066 access-graph-first doctrine + SPEC-ACCESS-GRAPH-AND-SPATIAL-GRAMMAR + tracker §47. ai-host 2209, editor matcher 5/5. Governance: ADR-0066/0063/0061, C53, C04, C11, SPEC-ARCHITECTURAL-PROGRAM-RULES.
