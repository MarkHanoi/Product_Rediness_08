# deploy-marker: v194 (founder go) — WINDOWS WITHIN THE ROOM'S WALL SEGMENT (#3 real build-path root cause) + corner-setback (#2). Founder's exact spec: "a window's FULL LENGTH must ALWAYS be within the room boundary line shared with the exterior wall; the insertion point is the window MIDPOINT". ROOT (windowEmission/shellWallMatch.ts resolveShellWindow): the ENGINE (emitWindows.roomWindowBand) already confines each window to its room's junction-bounded band — which is why the MODAL preview was always correct (it renders option.windows directly). But the BUILD path re-projects the window centre onto the matched SHELL wall and re-clamps the offset to the WHOLE shell wall's corner-pier band [END_CLEAR, shellLen−END_CLEAR] with ZERO knowledge of the partition T-junctions that split that shell wall into per-room portions — so on a long shell wall fronted by several rooms (and especially on the §WINDOW-MANDATORY-RESCUE relaxed-clamp ladder) a correctly-placed window got DRAGGED across a junction onto the neighbour ("between two rooms"). FIX (shellWallMatch.ts): shellJunctionsFromOptionWalls() recomputes interior-partition T-junctions on each matched shell wall from optionWalls (perp ≤200mm + ≥20° T-stem gate, mirrors emitGeometry, shell coords); roomIntervalOnShell() returns the junction-bounded interval CONTAINING the window's projected midpoint; the final offset band is now the INTERSECTION of the whole-wall corner-pier band AND the room's owned interval (interior ends pulled in by the partition half-band + clearance); the window is centred on its midpoint, clamped strictly inside, and DROPPED if even a minimal opening can't fit its own portion — NEVER emitted across a junction; + a hard self-checking post-condition (any junction strictly within the emitted span → drop). (#2) corner-setback already enforced by cornerSetbackForWall (≥0.5 m pier) at both ends; the interval clamp composes with it. (#5) placement centres each window on its owned portion; the §68.16 ≥1-window guarantee unchanged. Before→after: a 1.5 m window at offset 3.8 m on a 10 m shell wall with a junction at 5.0 m — naive span [3.8,5.3] CROSSES onto Room-B → now clamped offset+width ≤5.0, KEPT (relocated not lost); two rooms sharing a wall never overlap/cross; a too-short portion drops rather than crossing. shellWallMatch 63/63 (+10), FULL root tsc 0, junction-free walls byte-identical (apartment unaffected). PARALLEL (next batched deploy): upper-floor over-program/sealed-rooms + stair-open (#4/#1), bed-headboard-through-wall + pro kitchen plan symbols (#7/#8).
