# deploy-marker: v115 (founder go) — §VIEW-AUTOFRAME (3D+plan auto-zoom-to-building) + §GLOBE-LOCATION-SPIKE doc. (1) §VIEW-AUTOFRAME (SplitViewManager.ts): on entering the "3D + plan" combined view the main 3D pane was EMPTY until the user manually hit camera>Home/zoom — SplitViewManager.activate() only framed the plan pane's Canvas2D camera (_fitCamTargetToScene), never the main WebGPU 3D viewport, and the one-shot §3D-FRAME-ON-VIEW-SWITCH handler only fires on a 'view-activated' perspective event (split-view emits 'split-view-activated', not that). Fix: activate() now dispatches the existing 'zoom-fit' bus command (deferred ~320ms, re-guarded on this._active) so the building is framed automatically on every 3D+plan entry. Reuses zoomToAll (self-guards on empty scene). Additive — 2D Map / Plan / Site-3D paths untouched. (2) §GLOBE-LOCATION-SPIKE (master-tracker §51): documented the "model not in correct place on the Cesium 3D-tiles globe" root cause — NOT a wrong transform (the LTP-ENU frame is internally consistent: origin=geocoded lat/lon, boundary projected about it, both Forma massing + GLB anchor the same origin; Cesium upAxis/forwardAxis already Y/Z). The real offset is geocode-address-point ≠ true-parcel (~10-15m); fix is architectural (re-anchor ENU on parcel centroid + proj4-UTM rebase at the draw surface) → documented, NOT implemented this pass. Q2≠Q3 (independent). master-tracker §50 (autoframe) + §51 (globe spike) appended. Editor typecheck zero-new-errors. Governance: C04, C19, ADR-0061.
# deploy-marker: v114 (founder go) — modal program-editor + first-floor-bleed + bedroom-ensuite 2-door + Miro-canvas governance. (1) §MODAL-FILL + §MODAL-PROGRAM-EDIT (houseModalHtml.ts/HouseLayoutController.ts/HouseLayoutModal.ts): the house generation modal is now a program editor — opens seeded to the PLATE-FILLED resolved program (no "form says 1 bed, preview shows 4" mismatch), adds a per-room-type size (m²) row + Kitchen toggle, raises Bedrooms 0→8 / Bathrooms 1→4, every edit live-regenerates via the existing §MODAL-DYNAMIC loop; per-room resize writes the C52 roomAreas override. Brand white+#6600FF. (2) §DIAG-WALL-LEVEL (initTools.ts): the "first-floor rooms overlap on the GROUND plan" bug — the §P2.1 wall bridge defaulted a missing levelId to 'L0' (and `?? 'L0'` didn't catch the empty-string CEB emits), filing an upper wall onto Ground's childrenIds so the native plan exporter projected it. Fix: resolve the level ONCE (treat ''/undefined alike), feed the same value to VDT+bimManager+legacy store, and on a genuinely-unknown level SKIP registration + warn (never silently dump onto Ground). (3) §BEDROOM-ENSUITE-2DOOR (programRules.ts/bubbleGraph.ts/wallsAndDoors.ts): a bedroom paired with its own ensuite may now have 2 doors (corridor + ensuite) via a per-instance ensuiteHostId pairing — global rules untouched so no bedroom↔bedroom/over-cap leak, master byte-identical; +3 tests, ai-host 2228. (4) DOCS: SPEC-DYNAMIC-PROGRAM-CANVAS + ADR-0069 (dynamic Miro-style room-card canvas as the primary authoring surface, replacing the static brief; layout/graph/plan are derived projections per ADR-0061) + SPIKE-DYNAMIC-PROGRAM-CANVAS phase-0 plan. NOTE: the §PLATE-FILL "fill the whole plate" engine change is NOT in this build (founder rejected that approach mid-run — deferred to canvas-driven fill). Editor typecheck zero-new-errors. Governance: C52, ADR-0058/0061, C50, ADR-0063/0066, SPEC-ARCHITECTURAL-PROGRAM-RULES.
# deploy-marker: v113 (founder go) — house layout-quality wave (4 fixes, all gated byte-identical for apartment/rectilinear, ADR-0061). (1) §NO-PUBLIC-CARVE (engine, subdivide.ts): THE upper-storey "no corridor, no doors" root cause — trySingleRectCarve hard-required a PUBLIC room, but an upper floor has none (corridor+beds+baths only), so the carve returned null and the whole program squarified with only the master touching the corridor → r2/r3/r4/baths/stair SEALED (roomsWithDoor=3/9, §DIAG-TOPO-GATE failed=[circulation]). Fix: a double-loaded corridor carve when publicRooms=0 — central corridor spine, private rooms combed off BOTH sides, ensuite carved from master → every private room abuts the corridor → doors get placed. + §STAIR-SPINE-TOUCH (enumerate.ts): grow the corridor rect across the empty clearance to touch the minted stair so §STAIR-ROOM-DOOR places the corridor↔stair door (was stair0→NO DOOR). (2) §DIVIDER-RETAIN + §DIAG-SEAL-DROP (editor, HouseLayoutExecutor.ts): the "Room 00-001 68m²" giant-merge root cause was the weld silently DROPPING a collapsed partition that was the only divider between two rooms (invisible to §DIAG-SEAL, which reads the POST-weld set → openSeams=0 yet rooms merge). Fix: retain a collapsed-but-usable divider (orig len ≥0.5m) at its un-welded baseline instead of dropping it; §DIAG-SEAL-DROP now logs every weld-dropped divider (distinguishes weld-drop vs engine never-emitted). (3) §DIAG-ENTRANCE-FIX (editor, houseEntranceWall.ts): boundsHall=⚠ — the resolver's strict 0.2m vertex test fails on a drifted/rotated plate so the main door landed on a neighbour's façade; re-seat the entrance onto the shell wall with the longest hall-frontage edge-overlap (0.65m perp tol to survive plate drift), in a window-clear gap. (4) §ROOF-CONCAVE-DECOMPOSE (geometry-roof, roofDecompose.ts): an L/T/U roof was flat-degraded (founder: "roof in L ends up flat — not good"); now decomposes a rectilinear concave footprint into convex wings and builds a real pitched gable per wing at one slope/eave → a proper pitched L-roof (flat only for non-rectilinear concave, logged). (5) §KITCHEN-LU-PREFER (engine, kitchenLayout.ts): the parametric kitchen now prefers L (2 perpendicular usable walls) / U (3 walls) over a straight I run — perpendicular-arm test via buildChain, U back-wall cap relaxed 3.3→3.6m + area cap dropped, planKitchenRun no longer silently collapses L/U→I; + §DIAG-KITCHEN. ai-host 2225 + 33 kitchen + furnish 85, geometry-roof 36/36, editor typecheck zero-new-errors. Governance: ADR-0061/0063/0066, C53, C11, SPEC-CASA-UNIFAMILIAR-TYPOLOGY, SPEC-ARCHITECTURAL-PROGRAM-RULES, SPEC-FURNITURE-LAYOUT-ENGINE.
