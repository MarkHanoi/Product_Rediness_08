# deploy-marker: v109 (founder go) — §FRONTAGE-RECTIFY-FRAME + §STAIR-ROOM-DOOR (rotated-plate quality fix). v107 prod (218m² rotated -26° plate): every one of the 8 strategies was window-hard-invalid because frontageFail=[living,kitchen,hall,bedroom,bedroom] → it shipped the least-bad layout (big interior rooms, non-perimeter entrance hall, daylight=0.12). ROOT CAUSE: rooms tile inside the §RECTIFY-QUAD bbox, but validateFrontage + §DIAG-HALL-PERIMETER tested them against the RAW rotated quad whose edges aren't axis-aligned (rectTouchesPerimeter skips diagonal edges) → every frontage-required room FALSE-failed → window hard-reject for the whole pool. Fix: judge frontage against rectifyConvexQuad(shellPolygon) — the SAME frame the rooms tile in; non-rectifying shells (axis-aligned rect, L/U/T, >4-vtx) byte-identical (ADR-0061). + §DIAG-FRONTAGE-DIST (per-fail-room distance-to-perimeter so the next run proves false-negative vs genuine-interior). §STAIR-ROOM-DOOR: the minted stair room (privacy=circulation) was excluded from the door reroute passes → stair0→NO DOOR; the stair is now a legal reroute target (corridor/hall wall only) so it connects to the landing. ai-host 2219/2219. Governance: C53, ADR-0063/0066/0061, SPEC-ARCHITECTURAL-PROGRAM-RULES.
