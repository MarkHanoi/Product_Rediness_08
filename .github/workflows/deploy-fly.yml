# deploy-marker: v134 (founder go) — §WINDOW-EVERY-FRONTAGE: every window-desired room with an external wall gets a window (founder: "every room should have a window when possible"). Root (windows agent): a window-desired room whose ONLY external wall was just below the two host-length gates (minWallLengthMm, then minWidthMm+200 fallback) emitted ZERO candidates → §WINDOW-MANDATORY-RESCUE retries EMITTED windows so it had nothing to rescue → shipped windowless (perimeterRoomViolations / NO-WINDOW). FIX (emitWindows.emitWindowsForRoom): a 3rd last-resort tier — when both gates reject every wall, any external wall that can physically host a MIN_WINDOW_MM (400mm) opening WITH corner piers becomes a candidate, width shrunk per-wall to the largest fit (≥400mm), exactly ONE window per such wall; solar-widener + multi-window count guarded so the last-resort stays a single minimal opening. Interior rooms (no external wall) + generous walls byte-identical. ai-host 2268/2268 (+5 windowEmission regression), root tsc 0. DEFERRED: a room with NO external wall is correctly windowless — giving it one is a SUBDIVIDER job (give it a perimeter wall), not the emitter.
# deploy-marker: v133 (founder go) — §STAIR-POLY-NAME + §DIVIDER-RETAIN-DEDUP (build/detection quality). (1) STAIR NAMING: resolveStairRooms.centroidInRect tested the detected stair cell's centroid against the axis-aligned AABB of the ROTATED stair → on a 42.9° plate the AABB over-bounds the cell → roomsInVoidPerRect=[0] kept=0 → the stair cell kept a generic "Room NN" fallback name (+ §DIAG-STAIR-NAME 2-ROOM-FALLBACK). FIX: HouseLayoutExecutor now records the ROTATED stair quad (poly) alongside the AABB (StairRect/StairRectWorld gained optional poly); centroidInRect does an AABB pre-cull THEN a point-in-polygon test → the stair cell is captured → kept=1, named "Stair", bijection completes. Apartment/AABB-only path byte-identical. (2) EXTRA WALLS: §DIVIDER-RETAIN kept collapsed-but-usable dividers to prevent flood-merges, but some duplicated a shell/welded wall (both endpoints snap to a coincident line) → §DIAG-LEVELS EXTRA N. New §DIVIDER-RETAIN-DEDUP (segDuplicate: endpoint-match either orientation + collinear-overlap, 80mm tol) drops a retained divider only if coincident with a shell wall / welded survivor / already-retained divider; real separating dividers still survive. resolveStairRooms 8/8 + matchDetectedRooms 5/5, root tsc exit 0. NOTE: the kitchen↔neighbour MERGE ("Bedroom 1 / Kitchen") is a MISSING divider upstream in weldPartitionsToShell (engine) — a detected face encloses both engine centroids — deferred to the engine owner with a precise clamp-don't-drop plan (queued).
