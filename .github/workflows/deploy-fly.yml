elf a layout defect tracked separately. NEXT (v183): entrance-door-on-hall, ensuite/bathroom-1 missing doors, stair→corridor door accuracy.
# deploy-marker: v181 (founder go) — §72.1/§72.2 WINDOWS per-room-portion + §DIAG-PERIM-CORNER probe. Founder full-house test on the v180 build CONFIRMED the top-floor empty room is FIXED (first time). (1) WINDOWS spanning two rooms + not centred ("windows sharing few rooms with walls in the middle", "windows not centred"): a façade window was emitted centred on the WHOLE shell-wall run, so when an interior partition T-joined that wall's mid-span the window straddled it → appeared in BOTH rooms + off-centre. ROOT was junction DETECTION not the band logic: tgl/emitGeometry recorded an interior-partition T-junction onto a shell wall only within 60 mm of the shell CENTRELINE, but a real T-stem terminates ~half-shell-thickness (~100 mm) + the principal-axis tiling/weld residual (the house weld bridges up to 0.60 m) off-centre → the genuine junction was MISSED → the room's window band stayed the WHOLE wall → window centred at the wall midpoint, on the partition. FIX: widen the perp gate 60→200 mm + a ≥20° non-collinearity gate (so a partition lying parallel-near the shell can't seed a spurious cut); + emitWindows roomWindowBand robustness (§WINDOW-ROOM-PORTION-ROBUST) — de-dup near-coincident cuts (80 mm), pick the interval CONTAINING the room centroid (or nearest, per-room-distinct → no cross-room spill), place+centre the window WITHIN [band.lo,band.hi] so it can NEVER cross a detected junction. ALSO fixes the windowless-room case (old "two rooms got the same longest interval → forced de-overlap drop → a room lost its window"). ai-host 2531/2531 (+5 regression tests incl. a pin that a window which previously SPANNED the junction now doesn't), full root tsc 0. Confidence medium-high: the 200 mm widening is a calibrated estimate (½ shell + residual); if a production plate still straddles, next lever is the perp tol / passing the room frontage span. (2) §DIAG-PERIM-CORNER probe (founder #10 "perimeter joins clean at first, degrade after interior walls/openings — joint generator doesn't action again"): traced to the body-only post-openings repair (rebuildWallBodies §A.21.D40) reusing each wall's CACHED miter + SKIPPING resolveLevel (it exists to stop a whole-level re-trim moving a welded shell — the "ground walls go off" defect), so the FINAL corners are never re-mitred with the COMPLETE wall set. Rather than blind-patch this hang-prone path again (v180), the probe captures the EXACT corner state on the next build: clusters untrimmed level endpoints, and for every 2-wall L-corner logs whether both walls carry a cached miter + the GAP between their cached trimmed corner ends (clean ⇒ coincide; gap/square-cap ⇒ the open corner). v182 fixes #10 from that data with certainty. Still queued from this test (next): generic "Room NN-NNN" names + "Landing"→"Corridor" (naming fix in flight), entrance-door-on-hall, ensuite/bathroom-1 missing doors, stair→corridor door accuracy.
# deploy-marker: v180 (founder go) — 🔴 DEGENERATE-WALL BUILD HANG fixed + §DEPLOY-NO-CANCEL. THE COMPLETE BUILD: first deploy carrying EVERYTHING (v160–v180) uncancellable. (1) HANG: a generated house FROZE the tab during build. Confirmed mechanism (NOT an infinite loop — WallRebuildCoordinator._flush is single-pass + re-entry-guarded; resolveLevel has no loop): WallJoinResolver._clampEndToShellInnerFace REFUSED the §PARTITION-SHELL-INNER-FACE clamp on a ~0.1 m partition stub (newLen 0.049 < minLen 0.05) and bare-`return`ed → the stub stayed at its un-clamped baseline (end protruding through the shell), ABOVE the §WJR-NAN-GUARD 1e-3 near-zero sniff so it wasn't caught → entered the heavy extrude/CSG/BVH path → computeBoundingSphere/BVH spun → freeze (same class as the diff-thickness hang, at 0.1 m not ~0). FIX: in the REFUSED branch, when the wall's CURRENT un-trimmed length < DEGENERATE_STUB_LENGTH (new const 0.15 m) call `_flagInvalid(...)` → the mesh builder (already reads JoinData.invalid first) returns [] / hides the group → the stub never reaches the heavy path → no freeze. A LONG partition (>0.15 m) whose single end-clamp is refused is NOT dropped (stays un-clamped, pre-fix behaviour) — honours the §WJR-INVALID "don't drop a usable wall over one refused trim" rule. geometry-wall 66/66 (+4 WallJoinResolver.degenerateStub.test.ts, fails-before-fix), FULL root tsc 0. Follow-up (separate ticket, defense-in-depth): ai-host wallsAndDoors should also stop EMITTING the ~0.1 m stub (filter sub-0.15 m emitted partition segments) — but the resolver/builder flag is the correct hard backstop. (2) §DEPLOY-NO-CANCEL: concurrency cancel-in-progress true→FALSE — rapid back-to-back pushes had been cancelling each other's builds mid-flight, so v174–v179 never produced a completed deploy + the founder kept testing an OLDER build missing them; FALSE = a new push queues behind the running build (newest still wins, in-progress never killed). + §72 tracker triage of the founder's 11