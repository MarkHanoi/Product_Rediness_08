# deploy-marker: v95 (founder go) — THE room-merge ROOT FIX (two by-construction cures). The v94 §DIAG-SEAL prod data pinpointed the real seams: (1) §RECTIFY-SHELL-PROJECT — §RECTIFY-QUAD rectifies a sheared convex-quad shell to its bbox for tiling, so partition endpoints terminating on the perimeter land up to ~2.1m off the real ring; now projected onto the real shell after emit. (2) §FRACTURE-SEAL (the keystone) — on a stair-carved plate §STAIR-OBSTACLE-CARVE tiles every room into the DOMINANT rect and leaves the other fragment EMPTY; the sealing wall facing that empty fragment bounds only ONE room (boundsRoomIds.length===1) so it was mis-flagged isExternal → skipExteriorWalls SKIPPED it → never built → interior partitions dangle (§DIAG-SEAL part=1.2-3.7m) → RoomDetection floods → 1 merged room. Fix: a one-sided wall is external ONLY if its body lies ON the real shell perimeter (segmentOnPerimeter); the interior seal now builds BY CONSTRUCTION → rooms seal without relying on the weld. Both apartment/axis-aligned/L-U-T BYTE-IDENTICAL (no empty fragment → classification unchanged). ai-host 2144/2144, geometry-wall 50/50, room-topology 13/13. Also rides §STAIR-DEFAULT-BIAS+CONTAIN-UPSTREAM, §TOPO-HARD-REJECT, §WINDOW-MANDATORY-RESCUE, §LEVEL-STACK, modal §26 XA. + QUEUED docs: §27 daylight colour-field + §28 in-browser wind CFD (C54 + SPEC-WIND-CFD-LBM + ADR-0064).
