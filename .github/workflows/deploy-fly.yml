# deploy-marker: v163 (founder go) — §68.13 ~51 s POST-GEN STALL (NEEDS PROD-PROFILE CONFIRMATION — could not run the WebGPU pipeline in a browser; the dev server is unusable). ROOT (traced, not a single blocking call): `runHousePostGenChain` advances each storey/stage by awaiting the executor's `*.layout-executed` event, but the executors emit it SYNCHRONOUSLY the instant `batchCoordinator.runBatch()` RETURNS — long before the batch's async tail (the deferred resume-flush rAF + the FIRST-RENDER-POST-SUPPRESS WebGPU PSO-compile longtask + the post-batch PBR whole-scene traverse; none of the furnish/light/ceiling batches pass skipPbrUpgrade). So storey N+1's batch opens ON TOP of storey N's still-pending PSO+PBR tail → overlapping storms saturate the main thread → the just-registered resume-flush rAF can't get a slot for ~51 s (the §BN-07 warning is the victim, not the cause). Ruled out a single O(scene) offender (PBR scope already new-meshes-only + idle-deferred + chunked; REDETECT_ROOMS already coalesced to one cross-storey sweep). FIX (3 files, behaviour-preserving): new `BatchCoordinator.onNextSettle(cb)` primitive — a multi-subscriber fire-once "this batch has fully settled" signal flushed at onComplete (_isBatching=false) + the runBatch error path + forceReset (so an awaiter is never stranded), reusing the existing onComplete lifecycle — and `yieldBatchSettled()` in runHousePostGenChain awaits it after each batch-bearing stage (floor+ceiling, furnish, lighting) then yields a few macrotasks + one idle slot so the previous batch's resume-flush/PSO/PBR tail DRAINS before the next batch opens → storeys/stages no longer overlap. Same batches, commands, skipRedetectRooms/PBR flags, ground-first order, final scene — only temporal spacing changes. + §DIAG-POSTGEN-TIMING log (per storey/step elapsed ms — localises which step's PSO/PBR drain dominates next prod run). Macrotask yields (not raw rAF) keep P3 clean + the helper node-testable. root tsc 0, runHousePostGenChain