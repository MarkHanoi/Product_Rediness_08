# deploy-marker: v128 (founder go) — §VIEW-RANGE-BELOW: belowLevelDepth now actually suppresses storey-below ghost linework in plan (founder 2026-06-11 deep review: "view range seems to be 0 - however, we can see hidden/beyond lines from the level below"). ROOT CAUSE (audited): the view intent's View Range belowLevelDepth IS read correctly (PlanViewManager → planBelowY), but the per-segment classifier EdgeProjectorService.classifyByVertexY was ALWAYS given planFloorY and NEVER planBelowY, so `isBeyond = avgY < floorY` had NO lower bound → every below-floor edge tagged :beyond → the whole storey below leaked as ghost linework even at belowLevelDepth=0 ("Architectural Plan — Current Level Only"). FIX: thread planBelowY into classifyByVertexY (both the native/merged path L1918 + the IFC path L2234); a below-floor segment is :beyond ONLY inside the beyond zone [belowY, floor); belowY=null (belowLevelDepth=0) ⇒ storey below SUPPRESSED (dropped); belowY set (e.g. auto-doc 1.20m) ⇒ bounded to the depth (honours the value instead of the hardcoded near−2.5 leak). Now the View Range number genuinely controls below-level linework, governed by the active VISIBILITY INTENT per ViewRangeIntentResolver. classifyByVertexY exported + 3 unit tests (depth=0 suppress · depth=1.2 bounded · null-floor legacy). Editor typecheck zero-new-errors (pre-existing window-aug TS gaps only). Contract: ViewRangeIntentResolver + SystemIntents §system-architectural-plan-current-level.
