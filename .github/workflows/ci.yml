# ─────────────────────────────────────────────────────────────────────────────
# PRYZM — Continuous Integration
#
# Closes audit finding §B6 (no CI/CD pipeline existed on disk despite the
# CLAUDE.md governance claim that "the .github/workflows/ci.yml gate is hard-
# fail — no PR merges without it green"). This workflow is the real merge gate.
#
# Required status checks should be enabled in repo Settings → Branches → main:
#   - lint
#   - isolation
#   - command-manager
#   - test-server
#   - build
#   - apex-gates
#   - docker-image   (Fly parity — build + boot smoke; ~15-20 min)
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  # §A.10.i (2026-06-05) — run on PRs + manual ONLY, NOT on every push to `main`,
  # to conserve GitHub Actions minutes (this suite includes a ~20-min docker-image
  # build). Direct pushes to `main` no longer auto-run CI; run it deliberately via
  # the Actions tab → Run workflow, or it gates a PR. Doc-only changes are
  # path-ignored either way.
  pull_request:
    branches: [main]
    paths-ignore: ['docs/**', '**/*.md', '.claude/**']
  workflow_dispatch:

# Single concurrency group per ref — newer pushes cancel in-flight runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Match the engines pin in package.json
  NODE_VERSION: '20'
  PNPM_VERSION: '10.26.1'
  # Make the memory-hungry build deterministic across runners.
  NODE_OPTIONS: '--max-old-space-size=6144'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint

  isolation:
    name: Isolation gates (project + storage)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run check:isolation

  command-manager:
    name: Command-manager gate (no legacy execute())
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run check:commandmanager

  test-server:
    name: Server tests (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:server

  ga-gate:
    name: GA-gate (P1..P8 + perf budgets)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true   # advisory until §H33/H34/H35 (ratchet broadening) lands
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run ga-gate

  build:
    name: Build (tsc + vite + prod shim)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

  apex-gates:
    name: Apex/app contract gates (C51 §7 — apex-output · docs-site · route-surface)
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Builds apps/editor/dist-apex then runs the three apex-output gates.
      # Hard-fail: a cross-origin script, a >200 KB bundle, or a cookie op in
      # the apex surface blocks the merge (C51 §2.2.4 / §6.1.3 / §2.2.1).
      - run: pnpm run check:apex
      # Hard-fail: re-introducing a marketing route in the docs-site reopens the
      # ADR-052 drift trap (C51 §2.1.5 / §8). Marketing lives only in the editor.
      - run: pnpm run check:docs-site
      # Hard-fail: the app must 301 apex marketing paths to apex, not serve them
      # in-place; in-app marketing uses ?page= (C51 §3.2.1 / §5).
      - run: pnpm run check:route-surface
      # Hard-fail: the App-Shell boot logic must NOT live in an inline <script>
      # in index.html — the prod CSP (no 'unsafe-inline') would silently block
      # it (works on localhost only). It must load from /app-shell-boot.js.
      - run: pnpm run check:app-shell-csp

  a11y:
    name: Accessibility (axe-core WCAG 2.2 AA — REPORT-ONLY / advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # ─────────────────────────────────────────────────────────────────────
    # REPORT-ONLY (advisory) on purpose. This job runs the dynamic axe-core
    # WCAG 2.2 AA check (tests/browser-matrix/tests/wcag.spec.ts) against a
    # booted instance of the app and reports serious/critical violations,
    # but it MUST NOT block the merge today.
    #
    # DEFERRED FOUNDER DECISION: flipping this to a hard merge gate (i.e.
    # removing `continue-on-error: true` and adding `a11y` to the required
    # status checks in Settings → Branches → main) is intentionally NOT done
    # here. Do that only once the boot route is clean of serious/critical
    # violations and the founder signs off (Phase A tracker A.32.β).
    # ─────────────────────────────────────────────────────────────────────
    continue-on-error: true
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pryzm
          POSTGRES_PASSWORD: pryzm
          POSTGRES_DB: pryzm
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pryzm"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Install only the chromium browser + its OS deps (the a11y spec runs the
      # chromium project only — see test:a11y in tests/browser-matrix).
      - name: Install Playwright chromium
        run: pnpm --filter @pryzm/test-browser-matrix exec playwright install --with-deps chromium
      # Build + boot the real app so axe-core runs against the actual boot route.
      - name: Build the app
        run: pnpm run build
      - name: Boot the server and wait for readiness
        run: |
          NODE_ENV=production PORT=5000 \
            SESSION_SECRET=ci-a11y-secret-not-for-production \
            DATABASE_URL="postgresql://pryzm:pryzm@127.0.0.1:5432/pryzm" \
            SUPABASE_DB_URL="postgresql://pryzm:pryzm@127.0.0.1:5432/pryzm" \
            node server.js &
          echo "Waiting up to ~90s for /api/health/ready..."
          for i in $(seq 1 45); do
            if curl -fsS http://127.0.0.1:5000/api/health/ready >/dev/null 2>&1; then
              echo "✅ server ready"; exit 0
            fi
            sleep 2
          done
          echo "❌ server never became ready"; exit 1
      - name: Run axe-core WCAG 2.2 AA check (advisory)
        env:
          PRYZM_BASE_URL: http://127.0.0.1:5000
        run: pnpm --filter @pryzm/test-browser-matrix run test:a11y
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-playwright-report
          path: tests/browser-matrix/playwright-report
          if-no-files-found: ignore

  docker-image:
    name: Fly image — build + boot smoke (Dockerfile parity, A.17.x.11)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Ephemeral Postgres so the container can satisfy assertRequiredEnv() (needs
    # SESSION_SECRET + a DB URL) and run its boot migrations, exactly like Fly.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pryzm
          POSTGRES_PASSWORD: pryzm
          POSTGRES_DB: pryzm
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pryzm"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      # Proves the Dockerfile builds end-to-end — including that the 8 tests/*
      # workspace manifests reach the builder so `pnpm install --frozen-lockfile`
      # succeeds (BUG 2). BuildKit is required for the cache mounts in the file.
      - name: Build the production image
        run: DOCKER_BUILDKIT=1 docker build -t pryzm:ci .
      # Boots the SAME image Fly runs and waits for readiness. This proves prod
      # boot does not crash on a pruned devDependency (BUG 1 — the vite import)
      # and that migrations + the readiness gate work against a real Postgres.
      - name: Boot the image and wait for /api/health/ready
        run: |
          docker run -d --name pryzm-ci --network host \
            -e NODE_ENV=production \
            -e PORT=5000 \
            -e SESSION_SECRET=ci-smoke-secret-not-for-production \
            -e DATABASE_URL="postgresql://pryzm:pryzm@127.0.0.1:5432/pryzm" \
            -e SUPABASE_DB_URL="postgresql://pryzm:pryzm@127.0.0.1:5432/pryzm" \
            pryzm:ci
          echo "Waiting up to ~90s for the editor to boot + migrate + report ready..."
          for i in $(seq 1 45); do
            if curl -fsS http://127.0.0.1:5000/api/health/ready >/dev/null 2>&1; then
              echo "✅ image booted and /api/health/ready is green"
              exit 0
            fi
            sleep 2
          done
          echo "❌ container never became ready"
          exit 1
      - name: Dump container logs on failure
        if: failure()
        run: docker logs pryzm-ci || true
      - name: Cleanup
        if: always()
        run: docker rm -f pryzm-ci || true
