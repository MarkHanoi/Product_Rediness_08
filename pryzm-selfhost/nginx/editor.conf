# pryzm-selfhost/nginx/editor.conf
# S67 D3 — nginx front-door config for the editor service.
# Serves the editor SPA on :80 and reverse-proxies API + WebSocket traffic
# to the api-gateway service (resolved via Docker's internal DNS).

# Required for the WebSocket upgrade map below.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Resolve `api-gateway` via Docker's embedded DNS (127.0.0.11).  The
# `valid=10s` is a defensive setting in case the container is restarted.
resolver 127.0.0.11 valid=10s ipv6=off;

upstream pryzm_api {
    # Internal service name from docker-compose.yml.
    server api-gateway:5101;
    keepalive 16;
}

server {
    listen 80 default_server;
    server_name _;

    # ── Security headers (S67 D3 stub + S68 D3 CSP audit) ─────────
    # See docs/security/csp-audit-2026-Q4.md §2 for directive-by-directive
    # justification. CSP rationale highlights:
    #   • script-src 'wasm-unsafe-eval' — packages/geometry-kernel WASM modules.
    #   • style-src 'unsafe-inline' — Vite 7 + SPA inline runtime theme; nonce
    #     migration tracked at S70 D6.
    #   • connect-src ws: wss: — self-host without TLS still needs ws:; tighten
    #     to wss: only at S70 D8 once HSTS preload + cert-manager land.
    #   • frame-src 'self' blob: — preview-worker spawns Web Workers from blob
    #     URLs; plugin iframes use srcdoc + per-plugin CSP from
    #     packages/plugin-sdk/src/sandbox/policy.ts.
    add_header Content-Security-Policy      "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' ws: wss:; worker-src 'self' blob:; child-src 'self' blob:; frame-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'; upgrade-insecure-requests" always;
    add_header X-Frame-Options              "SAMEORIGIN" always;
    add_header X-Content-Type-Options       "nosniff" always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy           "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Cross-Origin-Opener-Policy   "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-site" always;
    # HSTS — emitted unconditionally; harmless on http: (browsers ignore over
    # plaintext).  Two-year max-age + includeSubDomains + preload eligibility.
    add_header Strict-Transport-Security    "max-age=63072000; includeSubDomains; preload" always;

    # Health endpoint for the editor container's healthcheck.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── REST API ───────────────────────────────────────────────────
    location /v1/ {
        proxy_pass         http://pryzm_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── WebSocket gateway ──────────────────────────────────────────
    # api-gateway's ws.ts attaches a WebSocketServer in noServer mode and
    # accepts upgrades on any path (parseWsPath gates by URL).  We proxy
    # every Upgrade: websocket request to the upstream.
    location /ws {
        proxy_pass         http://pryzm_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;   # WS sessions can be long-lived.
    }

    # ── Editor SPA ─────────────────────────────────────────────────
    # Single-page app: serve static assets, fall back to index.html for
    # client-side routes (Project Hub, /editor/<project>/*, etc.).
    location / {
        root      /usr/share/nginx/html;
        index     index.html;
        try_files $uri $uri/ /index.html;
    }
}
